<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Progress | E-Learning Platform</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body class="app-body">

  <header class="app-header border-bottom bg-white sticky-top">
    <nav class="navbar navbar-expand-lg container py-3">
      <a class="navbar-brand fw-bold text-primary" href="/app/dashboard">E-Learning Platform</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="mainNav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item">
            <a class="nav-link" href="/app/dashboard">Dashboard</a>
          </li>
          <li class="nav-item student-only">
            <a class="nav-link" href="/app/progress">My Progress</a>
          </li>
          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <section class="mb-4">
      <div class="hero-card">
        <p class="eyebrow mb-2">Progress Tracking</p>
        <h1 class="display-6 fw-bold mb-2">My learning progress</h1>
        <p class="text-secondary mb-0">Track your enrolled courses, quiz attempts, and the topics that need more review.</p>
      </div>
    </section>

    <section>
      <div id="progressContainer" class="row g-4"></div>
    </section>

    <div id="messageBox" class="alert d-none mt-4" role="alert"></div>
  </main>

  <script type="module" src="/public/js/pages/progress-page.js"></script>
</body>
</html>
