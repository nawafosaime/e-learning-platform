<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Details | E-Learning Platform</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body class="app-body">

  <header class="app-header border-bottom bg-white sticky-top">
    <nav class="navbar navbar-expand-lg container py-3">
      <a class="navbar-brand fw-bold text-primary" href="/app/dashboard">E-Learning Platform</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="mainNav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item">
            <a class="nav-link" href="/app/dashboard">Dashboard</a>
          </li>
          <li class="nav-item student-only">
            <a class="nav-link" href="/app/progress">My Progress</a>
          </li>
          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <section class="row g-4 mb-4">
      <article class="col-lg-8">
        <div class="card shadow-soft border-0">
          <div class="card-body">
            <p class="eyebrow mb-2">Course details</p>
            <h1 id="courseTitle" class="display-6 fw-bold mb-2">Loading...</h1>
            <p id="courseDescription" class="text-secondary mb-3"></p>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <span id="doctorName" class="badge badge-soft"></span>
              <span id="courseCategory" class="badge badge-soft"></span>
            </div>
            <div id="studentActions" class="d-none mt-4">
              <button id="enrollBtn" class="btn btn-primary">Enroll in Course</button>
            </div>
            <div id="studentFocusBox" class="d-none mt-4 focus-box"></div>
          </div>
        </div>
      </article>

      <article class="col-lg-4">
        <div class="metric-card h-100">
          <p class="text-secondary mb-2">My status</p>
          <div id="enrollmentStatus" class="mb-2">Checking enrollment...</div>
          <div id="progressValue" class="display-6 fw-bold">0%</div>
          <div class="progress mt-3" role="progressbar" aria-label="Progress">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
          </div>
        </div>
      </article>
    </section>

    <section class="doctor-panel d-none mb-4">
      <div class="row g-4">
        <article class="col-lg-6">
          <div class="card shadow-soft border-0 h-100">
            <div class="card-body">
              <h2 class="h4 fw-bold mb-3">Add lesson</h2>
              <form id="lessonForm" class="row g-3">
                <div class="col-12">
                  <label for="lessonTitle" class="form-label">Lesson title</label>
                  <input id="lessonTitle" name="title" type="text" class="form-control" required />
                </div>
                <div class="col-12">
                  <label for="lessonOrder" class="form-label">Order</label>
                  <input id="lessonOrder" name="order" type="number" class="form-control" min="1" required />
                </div>
                <div class="col-12">
                  <label for="lessonContent" class="form-label">Lesson content</label>
                  <textarea id="lessonContent" name="content" class="form-control" rows="5" required></textarea>
                </div>
                <div class="col-12">
                  <button class="btn btn-primary" type="submit">Save Lesson</button>
                </div>
              </form>
            </div>
          </div>
        </article>

        <article class="col-lg-6">
          <div class="card shadow-soft border-0 h-100">
            <div class="card-body">
              <h2 class="h4 fw-bold mb-3">Add quiz</h2>
              <form id="quizForm" class="row g-3">
                <div class="col-12">
                  <label for="quizTitle" class="form-label">Quiz title</label>
                  <input id="quizTitle" name="title" type="text" class="form-control" required />
                </div>
                <div class="col-12">
                  <label for="quizLesson" class="form-label">Related lesson</label>
                  <select id="quizLesson" name="lessonId" class="form-select">
                    <option value="">No specific lesson</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="quizQuestion" class="form-label">Question</label>
                  <input id="quizQuestion" type="text" class="form-control" required />
                </div>
                <div class="col-12">
                  <label for="quizOptions" class="form-label">Options</label>
                  <textarea id="quizOptions" class="form-control" rows="4" placeholder="One option per line" required></textarea>
                </div>
                <div class="col-md-6">
                  <label for="quizCorrectAnswer" class="form-label">Correct option index</label>
                  <input id="quizCorrectAnswer" type="number" class="form-control" min="0" required />
                </div>
                <div class="col-md-6">
                  <label for="quizTopic" class="form-label">Topic label</label>
                  <input id="quizTopic" type="text" class="form-control" placeholder="HTML Forms" />
                </div>
                <div class="col-12">
                  <label for="quizExplanation" class="form-label">Explanation</label>
                  <textarea id="quizExplanation" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-12">
                  <button class="btn btn-primary" type="submit">Save Quiz</button>
                </div>
              </form>
            </div>
          </div>
        </article>
      </div>
    </section>

    <section class="row g-4">
      <article class="col-lg-7">
        <div class="card shadow-soft border-0 h-100">
          <div class="card-body">
            <header class="mb-3">
              <h2 class="h4 fw-bold mb-1">Lessons</h2>
              <p class="text-secondary mb-0">Students can read lessons and mark them as completed.</p>
            </header>
            <div id="lessonsContainer"></div>
          </div>
        </div>
      </article>

      <article class="col-lg-5">
        <div class="card shadow-soft border-0 h-100">
          <div class="card-body">
            <header class="mb-3">
              <h2 class="h4 fw-bold mb-1">Quizzes</h2>
              <p class="text-secondary mb-0">Each quiz updates the progress tracker and weak topic recommendations.</p>
            </header>
            <div id="quizzesContainer"></div>
          </div>
        </div>
      </article>
    </section>

    <div id="messageBox" class="alert d-none mt-4" role="alert"></div>
  </main>

  <script type="module" src="/public/js/pages/course-page.js"></script>
</body>
</html>
