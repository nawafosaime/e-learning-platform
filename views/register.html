<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | E-Learning Platform</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body class="auth-body">

  <main class="container py-5">
    <section class="row justify-content-center">
      <article class="col-lg-6">
        <div class="card shadow-soft border-0">
          <div class="card-body p-4 p-md-5">
            <header class="mb-4 text-center">
              <p class="eyebrow mb-2">E-Learning Platform</p>
              <h1 class="h3 fw-bold">Create account</h1>
              <p class="text-secondary mb-0">Register as a student or a doctor.</p>
            </header>

            <form id="registerForm" novalidate>
              <div class="mb-3">
                <label for="name" class="form-label">Full name</label>
                <input id="name" name="name" type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required />
                <div class="form-text">Use at least 6 characters.</div>
              </div>

              <fieldset class="mb-4">
                <legend class="form-label mb-2">Role</legend>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role" id="studentRole" value="student" checked />
                  <label class="form-check-label" for="studentRole">Student</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role" id="doctorRole" value="doctor" />
                  <label class="form-check-label" for="doctorRole">Doctor</label>
                </div>
              </fieldset>

              <button class="btn btn-primary w-100" type="submit">Create Account</button>
            </form>

            <p class="mt-4 mb-0 text-center">
              Already have an account?
              <a href="/login">Log in</a>
            </p>

            <div id="messageBox" class="alert d-none mt-3" role="alert"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script type="module" src="/public/js/pages/register-page.js"></script>
</body>
</html>
