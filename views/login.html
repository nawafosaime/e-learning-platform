<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | E-Learning Platform</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body class="auth-body">

  <main class="container py-5">
    <section class="row justify-content-center">
      <article class="col-lg-5">
        <div class="card shadow-soft border-0">
          <div class="card-body p-4 p-md-5">
            <header class="mb-4 text-center">
              <p class="eyebrow mb-2">E-Learning Platform</p>
              <h1 class="h3 fw-bold">Welcome back</h1>
              <p class="text-secondary mb-0">Log in to continue learning or managing your courses.</p>
            </header>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required />
              </div>

              <button class="btn btn-primary w-100" type="submit">Log In</button>
            </form>

            <p class="mt-4 mb-0 text-center">
              No account yet?
              <a href="/register">Create one</a>
            </p>

            <section class="demo-box mt-4">
              <h2 class="h6 fw-bold">Suggested demo accounts after seeding</h2>
              <p class="mb-1"><strong>Doctor:</strong> doctor@example.com / Password123</p>
              <p class="mb-0"><strong>Student:</strong> student@example.com / Password123</p>
            </section>

            <div id="messageBox" class="alert d-none mt-3" role="alert"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script type="module" src="/public/js/pages/login-page.js"></script>
</body>
</html>
